name: tecnm_chat
description: "TecNM Chat - Aplicación de mensajería para el Tecnológico Nacional de México en Celaya"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  firebase_messaging: ^15.1.6

  # Media
  image_picker: ^1.1.2
  video_player: ^2.9.2
  emoji_picker_flutter: ^4.4.0

  # Agora RTC
  agora_rtc_engine: ^6.3.2

  # Imágenes
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0

  # Navegación
  go_router: ^14.6.2

  # Estado
  flutter_riverpod: ^2.6.1

  # Utilidades
  intl: ^0.20.2
  uuid: ^4.5.1
  http: ^1.2.2
  path_provider: ^2.1.5
  file_picker: ^8.1.1
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
